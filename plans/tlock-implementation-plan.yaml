phases:
  - id: scaffold
    action: init npm project, configure package.json with bin entry, install deps
    steps:
      - id: npm-init
        action: "npm init; set name=tlock, bin.tlock=bin/tlock.js, type=module"
        verification: "package.json exists with correct bin field"
      - id: install-deps
        action: "npm i commander chalk; npm i keytar || implement security-cli wrapper"
        verification: "node_modules populated; require('commander') resolves"
      - id: create-dirs
        action: "mkdir -p bin src; create bin/tlock.js with shebang + commander bootstrap"
        verification: "chmod +x bin/tlock.js; ./bin/tlock.js --help prints usage"
    verification: "npx . --help shows tlock usage"

  - id: config-module
    action: build src/config.js — XDG-style config store for lock registry
    steps:
      - id: config-path
        action: "use ~/.tlock/config.json to persist locked-target metadata"
        verification: "config.getLockRegistry() returns [] on first run"
      - id: config-schema
        action: |
          each entry: { target, type(folder|app), dmgPath?, originalPath?, createdAt }
        verification: "addEntry / removeEntry / getEntry round-trip correctly"
    verification: "unit smoke: write, read, delete config entries"

  - id: auth-module
    action: build src/auth.js — Touch ID + password + Keychain integration
    steps:
      - id: touchid-prompt
        action: "wrap node-biometric-auth (or local-auth) to call LAContext via native addon; expose authenticateWithBiometric(reason)"
        verification: "calling authenticateWithBiometric triggers macOS biometric dialog"
      - id: keychain-store
        action: "use keytar (or child_process security CLI) to store/retrieve master password under service=tlock, account=master"
        verification: "setPassword then getPassword round-trips"
      - id: first-run-setup
        action: "if no keychain entry exists, prompt user for password (inquirer or readline), store in keychain"
        verification: "first run prompts; second run skips prompt"
      - id: authenticate
        action: |
          exported authenticate(): try Touch ID → on fail/unavailable → prompt password → verify against keychain
        verification: "authenticate() resolves true after biometric or correct password"
    verification: "full auth flow works: first setup, biometric, password fallback"

  - id: lock-folder
    action: build src/lock-folder.js — encrypt folder into DMG, hide original
    steps:
      - id: detect-target
        action: "resolve absolute path; confirm it's a directory; abort if already locked (check registry)"
        verification: "locks real dir; rejects file, missing path, already-locked"
      - id: create-dmg
        action: |
          hdiutil create -encryption AES-256 -stdinpass -volname <name> -srcfolder <folder> -ov -format UDZO <dmgPath>
          pipe password from keychain into stdin
        verification: "DMG created at ~/.tlock/<hash>.dmg; file size > 0"
      - id: hide-original
        action: "rm -rf original folder after DMG verified; register in config"
        verification: "original path gone; config entry exists with type=folder"
      - id: unlock-folder
        action: |
          authenticate() → hdiutil attach -stdinpass <dmg> -mountpoint <originalPath>
          on detach/eject, folder disappears again
        verification: "after unlock, ls <originalPath> shows original contents"
      - id: permanent-unlock
        action: "tlock --remove <target>: mount, copy contents out, delete DMG, remove registry entry"
        verification: "folder restored permanently; config entry gone"
    verification: "round-trip: lock dir → ls fails → unlock → ls works → re-lock"

  - id: lock-app
    action: build src/lock-app.js — biometric gate before app launch
    steps:
      - id: detect-app
        action: "resolve /Applications/<name>.app or provided path; confirm .app bundle; abort if already locked"
        verification: "accepts valid .app; rejects non-app paths"
      - id: intercept-strategy
        action: |
          rename original binary: <app>/Contents/MacOS/<exec> → <exec>.tlock-original
          install wrapper shell script at original binary path that:
            1. calls `tlock --auth-gate <app>` (triggers biometric)
            2. on success, exec <exec>.tlock-original with same args
        verification: "wrapper script exists and is executable; original binary renamed"
      - id: auth-gate-subcommand
        action: "add hidden subcommand --auth-gate that runs authenticate() then exits 0/1"
        verification: "tlock --auth-gate triggers biometric prompt"
      - id: unlock-app
        action: "tlock --remove <app>: restore original binary, delete wrapper, remove registry entry"
        verification: "app launches normally without biometric after removal"
    verification: "lock app → double-click → biometric prompt → app launches"

  - id: cli-ux
    action: wire commander commands, help text, chalk formatting, error handling
    steps:
      - id: main-command
        action: |
          tlock <target>: auto-detect folder vs .app; route to lock-folder or lock-app
        verification: "tlock ~/Documents/secret locks folder; tlock Slack locks app"
      - id: list-command
        action: "tlock list: show all locked targets with type and timestamp"
        verification: "tlock list prints table after locking something"
      - id: unlock-command
        action: "tlock unlock <target>: authenticate then mount/restore"
        verification: "tlock unlock ~/Documents/secret mounts the DMG"
      - id: remove-command
        action: "tlock remove <target>: permanently un-lock, restore original"
        verification: "tlock remove <target> restores and cleans config"
      - id: status-command
        action: "tlock status <target>: show lock state"
        verification: "prints locked/unlocked for known target; unknown for others"
      - id: error-handling
        action: "wrap all commands in try/catch; chalk.red errors; exit(1) on failure; require macOS check at entry"
        verification: "running on Linux prints 'tlock requires macOS' and exits 1"
    verification: "all subcommands print help; invalid input shows friendly error"

  - id: publish
    action: prepare for npm publish
    steps:
      - id: readme
        action: "write README.md with install, usage, how-it-works, security notes"
        verification: "README renders correctly on GitHub preview"
      - id: npm-ignore
        action: ".npmignore excluding tests, plans, dev files"
        verification: "npm pack shows only needed files"
      - id: package-meta
        action: "set license, repo, keywords, engines.node>=18 in package.json"
        verification: "npm publish --dry-run succeeds"
    verification: "npm pack creates valid tarball; npx ./tlock-*.tgz --help works"

gotchas:
  - keytar requires native compilation; may need node-gyp + Xcode CLI tools; fallback to `security` CLI wrapper avoids this
  - node-biometric-auth is thin and may not exist or work reliably; may need swift bridge or osascript `tell application "System Events"` workaround
  - hdiutil create -stdinpass requires password piped to stdin, not TTY; use child_process.spawn with stdin.write
  - DMG mount leaves volume visible in Finder; user must eject to re-lock (document this)
  - app-locking via binary rename is fragile across macOS updates and code-signing; document limitations
  - SIP (System Integrity Protection) blocks modifying system apps in /System/Applications; only /Applications works
  - Touch ID requires Secure Enclave hardware; detect and skip gracefully on unsupported Macs
  - running via npx creates temp install; global install recommended for auth-gate subcommand to resolve
  - chalk v5+ is ESM-only; either use ESM throughout or pin chalk@4
