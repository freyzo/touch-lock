goal: npm_cli_for_lock_with_touchid

branding:
  project_name: touch-lock
  cli_command: tlock
  npm_package: tlock
  github_repo: touch-lock
  website_url: freyazou.com/projects/touch-lock

core_requirements:
  - cli_command: "tlock <folder_or_app_name>"
  - prompts_user_for_password_on_first_lock
  - uses_macos_touchid_for_unlock
  - supports_two_lock_types:
      - folders: mount_encrypted_volume
      - apps: biometric_launch_guard
  
encryption_strategy:
  folders:
    method: encrypted_dmg_volume
    locked_state: folder_invisible_or_inaccessible
    unlocked_state: mounted_at_original_path
    mechanism: diskutil_hdiutil_native_macos
  apps:
    method: launch_interceptor
    locked_state: app_requires_touchid_before_launch
    unlocked_state: app_launches_normally
    mechanism: applescript_or_launch_agent

authentication:
  - touchid: direct_biometric_auth
  - fallback: password_from_initial_setup
  - storage: macos_keychain_for_credentials

distribution:
  - npm_registry: hybrid_install_and_npx
  - global_install: "npm install -g tlock"
  - npx_usage: "npx tlock <target>"

stack:
  runtime: node.js
  reason: npm_cli_standard + macos_native_access
  cli_framework: commander.js
  reason: industry_standard + simple_arg_parsing
  
  macos_integrations:
    touchid: node-biometric-auth OR native_addon
    keychain: keytar OR security_cli_wrapper
    dmg_creation: child_process + hdiutil
    app_locking: child_process + osascript/launchctl
  
  file_structure:
    - bin/tlock.js
    - src/lock-folder.js
    - src/lock-app.js
    - src/auth.js
    - src/config.js
    - package.json

  dependencies:
    - commander: ~50kb
    - keytar: ~100kb
    - node-biometric-auth: ~50kb
    - chalk: ~10kb (optional)

user_context:
  - first_npm_cli_creation
  - needs_publishing_walkthrough

technical_decisions:
  - folder_encryption: hdiutil_create_encrypted_dmg
  - app_locking: intercept_launch_via_login_items_or_applescript
  - touchid_integration: node_module_for_biometric_prompt
  - keychain_access: node_keytar_or_security_cli